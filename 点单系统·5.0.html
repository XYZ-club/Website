<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>XYZ俱乐部 | 点单系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #2c2416;
      font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', 'Noto Serif SC', 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(180, 140, 90, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(140, 100, 50, 0.1) 0%, transparent 40%),
        linear-gradient(rgba(80, 55, 30, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80, 55, 30, 0.2) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 60px 60px, 60px 60px;
      position: relative;
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: linear-gradient(135deg, #f3e7d3 0%, #e7d5b7 100%);
      border: 2px solid #b49464;
      box-shadow: 0 20px 40px rgba(70, 40, 10, 0.5), inset 0 2px 8px rgba(255, 255, 200, 0.7);
      border-radius: 32px;
      padding: 32px 28px 20px 28px;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
    }

    .container::after {
      content: "";
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      background: linear-gradient(145deg, #c9a87c 0%, #8b6f4c 50%, #c9a87c 100%);
      border-radius: 34px;
      z-index: -1;
      opacity: 0.6;
      border: 1px solid #e0c097;
      pointer-events: none;
    }

    h1 {
      text-align: center;
      font-size: 46px;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      background: linear-gradient(180deg, #6b4e2e 0%, #3b2a18 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Georgia', 'Noto Serif SC', 'Times New Roman', serif;
      margin-bottom: 5px;
    }

    .subtitle {
      text-align: center;
      color: #5e3e1c;
      font-size: 14px;
      letter-spacing: 4px;
      margin-bottom: 20px;
      text-transform: uppercase;
      border-bottom: 2px solid #c8a16b;
      padding-bottom: 6px;
      display: table;
      margin-left: auto;
      margin-right: auto;
      font-weight: 600;
      background: rgba(245, 225, 190, 0.5);
      padding-left: 14px;
      padding-right: 14px;
      border-radius: 20px;
    }

    /* 公告按钮区域 */
    .announcement-area {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .announce-btn {
      background: linear-gradient(180deg, #f3d59c 0%, #c9a056 100%);
      border: 2px solid #e7bc73;
      color: #3b2c14;
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 2px;
      padding: 12px 32px;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(100, 60, 10, 0.5), inset 0 2px 6px #ffefc0;
      text-transform: uppercase;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 4px solid #8b6914;
      white-space: nowrap; /* 强制文字不换行 */
      width: auto; /* 宽度自适应 */
      min-width: fit-content; /* 保证内容完全显示 */
    }

    .announce-btn:active {
      transform: scale(0.96);
    }

    .customer-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
      background: rgba(235, 215, 175, 0.85);
      border: 1px solid #c9aa7a;
      padding: 24px;
      border-radius: 24px;
      box-shadow: inset 0 1px 10px rgba(255, 250, 220, 0.6), 0 10px 20px rgba(90, 60, 20, 0.3);
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .full-width {
      grid-column: span 2;
    }

    label {
      color: #4a3720;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    input, select, textarea {
      background: #fdf9f1;
      border: 2px solid #c7a16b;
      border-radius: 16px;
      padding: 12px 16px;
      color: #3e2e1c;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: inset 0 2px 6px rgba(160, 120, 60, 0.3);
      font-size: 15px;
      background: #fef5e6;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #8b6914;
      box-shadow: 0 0 0 3px rgba(180, 130, 50, 0.4), inset 0 2px 8px #dbbc7c;
      background: #fffbf0;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    #services {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      margin: 20px 0;
    }

    .service {
      background: linear-gradient(145deg, #f7ebd0, #eed9b0);
      border: 2px solid #c8a36b;
      border-radius: 20px;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 8px 18px rgba(100, 65, 20, 0.3), inset 0 1px 8px #ffeecb;
      transition: transform 0.2s, box-shadow 0.2s;
      border-bottom: 4px solid #a4814b;
    }

    .service-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .service-name {
      font-weight: 800;
      font-size: 18px;
      color: #4a3116;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .service-desc {
      font-size: 13px;
      line-height: 1.6;
      color: #5e4624;
      font-style: italic;
    }

    .service-price {
      color: #8b5a2b;
      font-weight: 800;
      font-size: 20px;
      background: rgba(245, 220, 160, 0.5);
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #e7cfaa;
      padding: 5px 8px;
      border-radius: 30px;
      border: 1px solid #b48b4e;
      box-shadow: inset 0 1px 4px rgba(90, 50, 10, 0.3);
      align-self: flex-start;
    }

    button {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #d3a96b, #9c7a4b);
      color: #2d1e0c;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      box-shadow: 0 4px 8px rgba(80, 40, 10, 0.4), inset 0 1px 3px #ffecbb;
      border: 1px solid #dbb45c;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0; /* 防止按钮被压缩 */
    }

    button:active {
      transform: scale(0.95);
    }

    .qty {
      width: 36px;
      text-align: center;
      font-weight: 700;
      font-size: 20px;
      color: #4b2d10;
      background: #f9efd8;
      border-radius: 10px;
      display: inline-block;
      flex-shrink: 0;
    }

    .hourly-box {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #4a3720;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
    }

    .checkbox-label input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #8b6914;
      transform: scale(1.1);
      margin: 0;
    }

    .hours-input {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fef5e6;
      padding: 5px 12px;
      border-radius: 20px;
      border: 2px solid #c7a16b;
      white-space: nowrap;
    }

    .hours-input span {
      font-weight: 600;
      color: #4a3720;
    }

    .hours-input input {
      width: 70px;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
      padding: 6px;
      background: #fffbf0;
      border: 1px solid #dbbc7c;
      border-radius: 12px;
    }

    .summary {
      margin-top: 30px;
      background: rgba(242, 225, 190, 0.9);
      border: 2px solid #b58f5a;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 15px 30px rgba(90, 55, 15, 0.5), inset 0 2px 12px #fff7e0;
    }

    .summary h2 {
      color: #4e3518;
      font-size: 26px;
      border-left: 8px solid #b87333;
      padding-left: 18px;
      margin-bottom: 18px;
      letter-spacing: 2px;
    }

    #orderList {
      background: #fbf3e0;
      padding: 18px;
      border-radius: 18px;
      border: 2px dashed #ac864f;
      color: #3c2a18;
      line-height: 2;
      margin-bottom: 20px;
      font-weight: 500;
      min-height: 60px;
    }

    .total {
      font-size: 34px;
      font-weight: 800;
      color: #8b4b1c;
      text-align: right;
      letter-spacing: 2px;
      background: rgba(250, 235, 190, 0.6);
      padding: 6px 18px;
      border-radius: 30px;
      display: inline-block;
      float: right;
    }

    .actions {
      display: flex;
      gap: 14px;
      margin-top: 24px;
      flex-wrap: wrap;
      clear: both;
    }

    .action-btn {
      flex: 1;
      height: 52px;
      border-radius: 28px;
      background: linear-gradient(180deg, #e7c38a 0%, #b68445 100%);
      border: 2px solid #eac086;
      color: #2f1f0b;
      font-weight: bold;
      font-size: 17px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(110, 60, 15, 0.5), inset 0 2px 8px #ffe5b0;
      border-bottom: 4px solid #7b5226;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap; /* 强制文字不换行 */
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: fit-content;
    }

    .action-btn:active {
      transform: scale(0.97);
    }

    .wx-btn {
      width: 100%;
      margin-top: 16px;
      height: 52px;
      border-radius: 28px;
      background: linear-gradient(180deg, #a3bd82 0%, #6b8541 100%);
      border: 2px solid #b1cf98;
      color: #1e2c12;
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(40, 70, 15, 0.5), inset 0 2px 8px #ebffe0;
      border-bottom: 4px solid #4e6728;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wx-btn:active {
      transform: scale(0.97);
    }

    /* 版权信息 */
    .copyright {
      text-align: center;
      margin-top: 24px;
      color: #5e4624;
      font-size: 13px;
      letter-spacing: 1px;
      font-weight: 500;
      border-top: 1px dashed #c8a16b;
      padding-top: 16px;
      opacity: 0.9;
    }

    .copyright span {
      font-weight: 700;
      color: #6b4e2e;
    }

    a {
      text-decoration: none;
    }

    @media (max-width: 650px) {
      .full-width {
        grid-column: span 1;
      }
      h1 {
        font-size: 36px;
      }
      .container {
        padding: 24px 16px 18px 16px;
      }
      .action-btn {
        font-size: 15px;
        letter-spacing: 1px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>XYZ·俱乐部</h1>
  <div class="subtitle">▸ XYZ点单系统 ◂</div>

  <!-- 公告按钮 -->
  <div class="announcement-area">
    <button class="announce-btn" id="announceBtn">📢 俱乐部公告</button>
  </div>

  <div class="customer-info">
    <div class="form-group">
      <label>⚡ 游戏昵称</label>
      <input id="nickname" placeholder="昵称" autocomplete="off">
    </div>
    <div class="form-group">
      <label>🆔 游戏ID</label>
      <input id="gameId" placeholder="游戏ID" autocomplete="off">
    </div>
    <div class="form-group">
      <label>🌐 大区</label>
      <select id="region">
        <option value="">选择战区</option>
        <option>QQ区</option>
        <option>微信区</option>
      </select>
    </div>
    <div class="form-group full-width">
      <label>📟 备注</label>
      <textarea id="remark" placeholder="备注..." autocomplete="off"></textarea>
    </div>
  </div>

  <div id="services"></div>

  <div class="summary">
    <h2>📋 任务简报</h2>
    <div id="orderList">暂无选择</div>
    <div class="total">总计：¥<span id="total">0</span></div>

    <div class="actions">
      <button class="action-btn" onclick="submitOrder()">▶ 提交订单</button>
      <button class="action-btn" onclick="reset()">↺ 重置</button>
    </div>

    <a href="weixin://dl/chat?pehtc_0711">
      <button class="wx-btn">📡 接通微信频道（无法使用）</button>
    </a>
  </div>

  <!-- 版权信息 -->
  <div class="copyright">
    © 2026 <span>XYZ 俱乐部</span> · 保留所有权利 · 美术设计 by DEEPSEEK
  </div>
</div>

<script>
  (function() {
    const services = [
      { n: "娱乐单", p: 28, desc: "轻松娱乐陪玩，适合休闲放松，聊天互动，快乐游戏。", type: "qty" },
      { n: "技术单", p: 58, desc: "1陪玩2陪护、仨陪陪高强度保护、意识提升，帮助快速提高技术。", type: "qty" },
      { n: "包时单", p: 58, desc: "按小时长期陪玩，可根据需求安排多种玩法。（最高8小时）", type: "hourly" },
      { n: "通宵单", p: 1288, desc: "固定时段22:00-08:00，10小时高强度陪玩，双陪玩轮换。", type: "qty" },
      { n: "至尊陪", p: 68, desc: "顶级专属服务，包含技术指导、娱乐互动和全程陪伴。（最高8小时）", type: "hourly" }
    ];

    let qtyState = new Array(services.length).fill(0);
    let hourlyChecked = new Array(services.length).fill(false);
    let hourlyHours = new Array(services.length).fill(1);

    const box = document.getElementById("services");
    const fragment = document.createDocumentFragment();
    const qtySpans = [];
    const hourInputs = [];
    const checkboxes = [];

    services.forEach((s, i) => {
      const div = document.createElement("div");
      div.className = "service";
      
      if (s.type === "qty") {
        div.innerHTML = `
          <div>
            <div class="service-name">${s.n}</div>
            <div class="service-desc">${s.desc}</div>
          </div>
          <div class="service-header">
            <div class="service-price">¥${s.p}</div>
            <div class="qty-control">
              <button data-index="${i}" data-delta="-1" class="qty-btn">-</button>
              <span id="q${i}" class="qty">0</span>
              <button data-index="${i}" data-delta="1" class="qty-btn">+</button>
            </div>
          </div>
        `;
      } else {
        div.innerHTML = `
          <div>
            <div class="service-name">${s.n}</div>
            <div class="service-desc">${s.desc}</div>
          </div>
          <div class="service-price">¥${s.p} /小时</div>
          <div class="hourly-box">
            <label class="checkbox-label">
              <input type="checkbox" data-index="${i}" class="hourly-checkbox"> 选择
            </label>
            <div class="hours-input">
              <span>🕒</span>
              <input type="number" id="hour${i}" value="1" min="1" max="8" step="1" data-index="${i}" class="hour-input">
              <span>小时</span>
            </div>
          </div>
        `;
      }
      fragment.appendChild(div);
    });

    box.appendChild(fragment);

    const nicknameEl = document.getElementById("nickname");
    const gameIdEl = document.getElementById("gameId");
    const regionEl = document.getElementById("region");
    const remarkEl = document.getElementById("remark");
    const orderListEl = document.getElementById("orderList");
    const totalEl = document.getElementById("total");

    for (let i = 0; i < services.length; i++) {
      if (services[i].type === "qty") {
        qtySpans.push(document.getElementById("q" + i));
      } else {
        qtySpans.push(null);
        const cb = document.querySelector(`.hourly-checkbox[data-index="${i}"]`);
        const hr = document.getElementById("hour" + i);
        if (cb) checkboxes.push(cb);
        if (hr) hourInputs.push(hr);
      }
    }

    box.addEventListener("click", function(e) {
      const btn = e.target.closest(".qty-btn");
      if (!btn) return;
      const index = parseInt(btn.getAttribute("data-index"));
      const delta = parseInt(btn.getAttribute("data-delta"));
      qtyState[index] = Math.max(0, qtyState[index] + delta);
      if (qtySpans[index]) qtySpans[index].textContent = qtyState[index];
      scheduleUpdate();
    });

    box.addEventListener("change", function(e) {
      if (e.target.classList.contains("hourly-checkbox")) {
        const index = parseInt(e.target.getAttribute("data-index"));
        hourlyChecked[index] = e.target.checked;
        if (!e.target.checked) {
          const hourInput = document.getElementById("hour" + index);
          if (hourInput) {
            hourInput.value = 1;
            hourlyHours[index] = 1;
          }
        } else {
          const hourInput = document.getElementById("hour" + index);
          if (hourInput) hourlyHours[index] = parseInt(hourInput.value) || 1;
        }
        scheduleUpdate();
      }
    });

    box.addEventListener("input", function(e) {
      if (e.target.classList.contains("hour-input")) {
        const index = parseInt(e.target.getAttribute("data-index"));
        let val = parseInt(e.target.value);
        if (isNaN(val) || val < 1) val = 1;
        if (val > 8) {
          val = 8;
          e.target.value = 8;
          alert("陪玩小时最高不可超过8小时");
        }
        hourlyHours[index] = val;
        if (hourlyChecked[index]) scheduleUpdate();
      }
    });

    let updateTimer = null;
    function scheduleUpdate() {
      if (updateTimer) cancelAnimationFrame(updateTimer);
      updateTimer = requestAnimationFrame(updateOrderList);
    }

    function updateOrderList() {
      const n = nicknameEl.value || "未填写";
      const id = gameIdEl.value || "未填写";
      const r = regionEl.value || "未选择";
      const rm = remarkEl.value || "无";

      let parts = [
        "<b>⚡昵称：</b>" + n,
        "<b>🆔ID：</b>" + id,
        "<b>🌍大区：</b>" + r,
        "<b>📝备注：</b>" + rm,
        "<br><b>📦订单清单：</b>"
      ];

      let total = 0;
      let has = false;

      for (let i = 0; i < services.length; i++) {
        const s = services[i];
        if (s.type === "qty" && qtyState[i] > 0) {
          has = true;
          const t = qtyState[i] * s.p;
          total += t;
          parts.push("🔹 " + s.n + " × " + qtyState[i] + " = ¥" + t);
        } else if (s.type === "hourly" && hourlyChecked[i]) {
          const hours = hourlyHours[i] || 1;
          has = true;
          const t = hours * s.p;
          total += t;
          parts.push("🔹 " + s.n + " · " + hours + "小时 = ¥" + t);
        }
      }

      if (!has) parts.push("⛔ 未选取服务");
      orderListEl.innerHTML = parts.join("<br>");
      totalEl.textContent = total.toFixed(2);
    }

    nicknameEl.addEventListener("input", scheduleUpdate);
    gameIdEl.addEventListener("input", scheduleUpdate);
    regionEl.addEventListener("change", scheduleUpdate);
    remarkEl.addEventListener("input", scheduleUpdate);

    document.getElementById("announceBtn").addEventListener("click", function() {
      alert("📢 俱乐部公告\n\n欢迎来到XYZ俱乐部！\n1. 包时与至尊陪最高8小时。\n2. 订单提交后请联系微信 pehtc_0711。\n3. 通宵单固定22:00-08:00。\n祝您游戏愉快！");
    });

    window.submitOrder = function() {
      let text = "【XYZ·订单】\n\n昵称：" + nicknameEl.value +
                 "\nID：" + gameIdEl.value +
                 "\n大区：" + regionEl.value +
                 "\n备注：" + remarkEl.value +
                 "\n\n订单明细：";

      let hasOrder = false;
      for (let i = 0; i < services.length; i++) {
        const s = services[i];
        if (s.type === "qty" && qtyState[i] > 0) {
          hasOrder = true;
          text += "\n" + s.n + " × " + qtyState[i] + " = ¥" + (qtyState[i] * s.p);
        } else if (s.type === "hourly" && hourlyChecked[i]) {
          const hours = hourlyHours[i] || 1;
          hasOrder = true;
          text += "\n" + s.n + " · " + hours + "小时 = ¥" + (hours * s.p);
        }
      }

      if (!hasOrder) {
        alert("请先选择服务项目");
        return;
      }

      navigator.clipboard.writeText(text).then(() => {
        alert("⚡ 订单已复制至剪贴板，请将订单提交至 pehtc_0711(微信)");
      }).catch(() => {
        alert("⚡ 订单已生成，请手动复制并提交至 pehtc_0711(微信)\n\n" + text);
      });
    };

    window.reset = function() {
      qtyState = new Array(services.length).fill(0);
      for (let i = 0; i < services.length; i++) {
        if (services[i].type === "qty" && qtySpans[i]) qtySpans[i].textContent = "0";
      }
      hourlyChecked = new Array(services.length).fill(false);
      hourlyHours = new Array(services.length).fill(1);
      checkboxes.forEach(cb => { cb.checked = false; });
      hourInputs.forEach(inp => { inp.value = 1; });
      nicknameEl.value = "";
      gameIdEl.value = "";
      regionEl.value = "";
      remarkEl.value = "";
      scheduleUpdate();
    };

    updateOrderList();
  })();
</script>
