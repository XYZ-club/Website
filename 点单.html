<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>XYZ俱乐部 | 点单系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c0f;
      font-family: 'Rajdhani', 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        linear-gradient(rgba(0, 230, 250, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 230, 250, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      position: relative;
    }

    /* 动态扫描线效果 */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,255,255,0.02) 0px, rgba(0,0,0,0.2) 2px, transparent 4px);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: rgba(10, 14, 20, 0.85);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(0, 255, 255, 0.25);
      box-shadow: 0 0 50px rgba(0, 180, 255, 0.2), inset 0 0 30px rgba(0, 150, 255, 0.1);
      border-radius: 20px;
      padding: 30px 28px;
      position: relative;
      z-index: 10;
      clip-path: polygon(0% 0%, 95% 0%, 100% 5%, 100% 100%, 5% 100%, 0% 95%);
      transition: 0.2s;
    }

    /* 机甲边框装饰 */
    .container::after {
      content: "";
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #00ffff, #0077ff, #00ffff, #0055ff);
      border-radius: 22px;
      z-index: -1;
      opacity: 0.3;
      filter: blur(10px);
    }

    h1 {
      text-align: center;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #00f2ff;
      text-shadow: 0 0 20px #00a6ff, 0 0 40px #006eff;
      margin-bottom: 5px;
      background: linear-gradient(180deg, #a0f0ff 0%, #0080ff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Orbitron', 'Rajdhani', sans-serif;
    }

    .subtitle {
      text-align: center;
      color: #7fbfdf;
      font-size: 14px;
      letter-spacing: 4px;
      margin-bottom: 30px;
      text-transform: uppercase;
      border-bottom: 2px solid rgba(0, 255, 255, 0.4);
      display: inline-block;
      padding-bottom: 6px;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      display: table;
      font-weight: 500;
    }

    .customer-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
      background: rgba(0, 20, 40, 0.4);
      backdrop-filter: blur(10px);
      border: 1px solid #00e5ff40;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(0, 180, 255, 0.2);
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }
    .full-width {
      grid-column: span 2;
    }

    label {
      color: #00e0ff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 8px #006eff;
    }

    input, select, textarea {
      background: #0b1219;
      border: 2px solid #1e405b;
      border-radius: 8px;
      padding: 12px 14px;
      color: #e0f0ff;
      font-weight: 500;
      outline: none;
      transition: 0.2s;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
      font-size: 15px;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #00f2ff;
      box-shadow: 0 0 20px #0077ff, inset 0 0 8px #00a6ff;
      background: #0a1520;
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    #services {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
      margin: 20px 0 20px;
    }

    .service {
      background: rgba(8, 20, 33, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid #00b8ff;
      border-radius: 14px;
      padding: 16px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 0 18px rgba(0, 160, 255, 0.3);
      transition: all 0.25s;
      position: relative;
      clip-path: polygon(6% 0%, 94% 0%, 100% 8%, 100% 92%, 94% 100%, 6% 100%, 0% 92%, 0% 8%);
    }

    .service:hover {
      border-color: #0ff;
      box-shadow: 0 0 35px #00a6ff, inset 0 0 12px rgba(0,255,255,0.3);
      transform: translateY(-2px);
      background: rgba(12, 32, 50, 0.9);
    }

    .service-name {
      font-weight: 700;
      font-size: 18px;
      color: #b3f0ff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .service-desc {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.6;
      color: #8fbfd6;
    }
    .service-price {
      color: #ffd966;
      font-weight: 800;
      font-size: 20px;
      text-shadow: 0 0 12px #ffbb00;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #001e30;
      padding: 4px 8px;
      border-radius: 30px;
      border: 1px solid #0077ff;
    }

    button {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: #0f2838;
      color: #00f2ff;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      box-shadow: 0 0 12px #006eff;
      border: 1px solid #00ccff;
    }

    button:hover {
      background: #00a6ff;
      color: #000;
      box-shadow: 0 0 28px #00ffff;
      border-color: #fff;
    }

    .qty {
      width: 36px;
      text-align: center;
      font-weight: 700;
      font-size: 18px;
      color: #00ffcc;
    }

    .summary {
      margin-top: 30px;
      background: rgba(0, 18, 36, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid #0088ff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 0 35px rgba(0,160,255,0.4);
    }

    .summary h2 {
      color: #00eaff;
      font-size: 24px;
      border-left: 6px solid #ff3366;
      padding-left: 16px;
      margin-bottom: 18px;
      letter-spacing: 2px;
    }

    #orderList {
      background: #030b12;
      padding: 18px;
      border-radius: 14px;
      border: 1px dashed #00a3ff;
      color: #cceeff;
      line-height: 2;
      margin-bottom: 20px;
    }

    .total {
      font-size: 32px;
      font-weight: 800;
      color: #ff3366;
      text-align: right;
      text-shadow: 0 0 20px #ff0044;
      letter-spacing: 2px;
    }

    .actions {
      display: flex;
      gap: 14px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .action-btn {
      flex: 1;
      height: 50px;
      border-radius: 8px;
      background: linear-gradient(135deg, #003c5a, #001f33);
      border: 2px solid #00ccff;
      color: #e0f7ff;
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 20px #0055ff;
    }

    .action-btn:hover {
      background: #0077ff;
      color: #000;
      border-color: #fff;
      box-shadow: 0 0 40px #00a6ff;
    }

    .wx-btn {
      width: 100%;
      margin-top: 16px;
      height: 50px;
      border-radius: 8px;
      background: #0a2f1f;
      border: 2px solid #22c55e;
      color: #bbffbb;
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 0 20px #22c55e;
      transition: 0.3s;
    }

    .wx-btn:hover {
      background: #22c55e;
      color: #000;
      box-shadow: 0 0 45px #00ff80;
    }

    a {
      text-decoration: none;
    }

    @media (max-width: 650px) {
      .full-width {
        grid-column: span 1;
      }
    }
  </style>
  <!-- 引入机甲风格字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <h1>XYZ·俱乐部</h1>
  <div class="subtitle">▸ XYZ点单系统 ◂</div>

  <!-- 客户信息区域 (完全保留原有id和结构) -->
  <div class="customer-info">
    <div class="form-group">
      <label>⚡ 游戏昵称</label>
      <input id="nickname" placeholder="呼号">
    </div>
    <div class="form-group">
      <label>🆔 游戏ID</label>
      <input id="gameId" placeholder="识别码">
    </div>
    <div class="form-group">
      <label>🌐 大区</label>
      <select id="region">
        <option value="">选择战区</option>
        <option>QQ区</option>
        <option>微信区</option>
      </select>
    </div>
    <div class="form-group full-width">
      <label>📟 备注</label>
      <textarea id="remark" placeholder="附加指令..."></textarea>
    </div>
  </div>

  <!-- 动态服务容器 -->
  <div id="services"></div>

  <!-- 订单总结区域 -->
  <div class="summary">
    <h2>📋 任务简报</h2>
    <div id="orderList">暂无选择</div>
    <div class="total">总计：¥<span id="total">0</span></div>

    <div class="actions">
      <button class="action-btn" onclick="submitOrder()">▶ 提交订单</button>
      <button class="action-btn" onclick="reset()">↺ 重置</button>
    </div>

    <!-- 微信跳转按钮 (原始逻辑) -->
    <a href="weixin://dl/chat?pehtc_0711">
      <button class="wx-btn">📡 接通微信频道</button>
    </a>
  </div>
</div>

<script>
  // 服务数据保持原样
  const services = [
  {
    n: "娱乐单",
    p: 35,
    desc: "轻松娱乐陪玩，适合休闲放松，聊天互动，快乐游戏。"
  },
  {
    n: "技术单",
    p: 50,
    desc: "提供战术指导、操作教学、意识提升，帮助快速提高技术。"
  },
  {
    n: "钢枪单",
    p: 80,
    desc: "主打刚枪与高击杀打法，适合喜欢激烈对抗的玩家。"
  },
  {
    n: "上分单",
    p: 150,
    desc: "专注稳定上分，提高段位，适合冲榜和赛季末冲刺。"
  },
  {
    n: "包时单",
    p: 200,
    desc: "按小时长期陪玩，可根据需求安排多种玩法。"
  },
  {
    n: "通宵单",
    p: 1000,
    desc: "全天高强度陪玩服务，持续一整天，适合长时间作战。"
  },
  {
    n: "至尊陪",
    p: 800,
    desc: "顶级专属服务，包含技术指导、娱乐互动和全程陪伴。"
  },
  {
    n: "地铁/古墓",
    p: 29.9,
    desc: "专门针对地铁逃生和古墓迷途模式，熟悉路线与打法。"
  }
];

  let qty = Array(services.length).fill(0);
  const box = document.getElementById("services");

  // 动态生成服务卡片
  services.forEach((s,i)=>{
    const div = document.createElement("div");
    div.className = "service";
    div.innerHTML = `
  <div>
    <div class="service-name">${s.n}</div>
    <div class="service-desc">${s.desc}</div>
  </div>
  <div class="service-price">¥${s.p}</div>
  <div class="qty-control">
    <button onclick="add(${i},-1)">-</button>
    <span id="q${i}" class="qty">0</span>
    <button onclick="add(${i},1)">+</button>
  </div>
`;
    box.appendChild(div);
  });

  function add(i,v){
    qty[i] = Math.max(0, qty[i] + v);
    document.getElementById("q"+i).innerText = qty[i];
    update();
  }

  function update(){
    let list = "";
    let total = 0;
    const n = document.getElementById("nickname").value || "未填写";
    const id = document.getElementById("gameId").value || "未填写";
    const r = document.getElementById("region").value || "未选择";
    const rm = document.getElementById("remark").value || "无";

    list += `
      <b>⚡昵称：</b>${n}<br>
      <b>🆔ID：</b>${id}<br>
      <b>🌍大区：</b>${r}<br>
      <b>📝备注：</b>${rm}<br><br>
      <b>📦装备清单：</b><br>
    `;

    let has = false;
    services.forEach((s,i)=>{
      if(qty[i] > 0){
        has = true;
        let t = qty[i] * s.p;
        total += t;
        list += `🔹 ${s.n} × ${qty[i]} = ¥${t}<br>`;
      }
    });

    if(!has) list += "⛔ 未选取服务";
    document.getElementById("orderList").innerHTML = list;
    document.getElementById("total").innerText = total.toFixed(2);
  }

  document.addEventListener("input", update);

  function submitOrder(){
    const wx = "pehtc_0711";
    let text = `【XYZ·订单】\n\n昵称：${document.getElementById("nickname").value}\nID：${document.getElementById("gameId").value}\n大区：${document.getElementById("region").value}\n备注：${document.getElementById("remark").value}\n\n订单明细：`;
    
    services.forEach((s,i)=>{
      if(qty[i] > 0){
        text += `\n${s.n} × ${qty[i]} = ¥${qty[i]*s.p}`;
      }
    });

    navigator.clipboard.writeText(text);
    alert("⚡ 订单已复制至核心，启动微信链接");
    window.location.href = "weixin://dl/chat?" + wx;
  }

  function reset(){
    qty = qty.map(() => 0);
    services.forEach((_,i) => {
      document.getElementById("q"+i).innerText = 0;
    });
    document.getElementById("nickname").value = "";
    document.getElementById("gameId").value = "";
    document.getElementById("region").value = "";
    document.getElementById("remark").value = "";
    update();
  }

  update();
</script>
</body>
</html>
